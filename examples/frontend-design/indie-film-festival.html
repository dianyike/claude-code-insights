<!DOCTYPE html>
<html lang="en">
<head>
<!--
  Who/where: Independent cinema enthusiasts, desktop-first, one-time high-impact emotional impression
  Focal point: "LIMINAL" in massive variable serif — typography IS the poster
  Mood: cinematic, transgressive, intimate
  Omission: No hero image — typography alone carries visual weight; a film still would compete with the type-as-graphic concept
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIMINAL — 9th Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,400,0..100,0..1&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --color-bg: #0a0a1a;
    --color-text: #e8dcc8;
    --color-feature: #c45d3e;
    --color-text-muted: rgba(232, 220, 200, 0.4);
    --mouse-x: 50%;
    --mouse-y: 50%;
  }

  body {
    background: var(--color-bg);
    color: var(--color-text);
    overflow: hidden;
    cursor: crosshair;
    opacity: 0;
    transition: opacity 500ms ease-out;
  }

  /* ── Film grain overlay ── */
  .grain {
    position: fixed;
    inset: -50%;
    width: 200%;
    height: 200%;
    pointer-events: none;
    z-index: 100;
    opacity: 0.04;
    background-repeat: repeat;
    animation: grain-shift 5000ms steps(5) infinite;
  }

  @keyframes grain-shift {
    0%   { transform: translate(0, 0); }
    20%  { transform: translate(-1%, 1%); }
    40%  { transform: translate(1%, -0.5%); }
    60%  { transform: translate(-0.5%, -1%); }
    80%  { transform: translate(0.5%, 0.5%); }
    100% { transform: translate(0, 0); }
  }

  /* ── Mouse-following projector light ── */
  .light {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background: radial-gradient(
      600px circle at var(--mouse-x) var(--mouse-y),
      rgba(196, 93, 62, 0.05) 0%,
      transparent 100%
    );
  }

  /* ── Hero ── */
  .hero {
    position: relative;
    width: 100vw;
    height: 100vh;
    z-index: 10;
  }

  /* ── Edition number ── */
  .edition {
    position: absolute;
    top: 48px;
    right: 64px;
    font-family: 'Space Mono', monospace;
    font-size: 64px;
    font-weight: 400;
    color: var(--color-feature);
    line-height: 1;
    opacity: 0.6;
  }

  /* ── Title ── */
  .title {
    position: absolute;
    left: -3vw;
    top: 50%;
    transform: translateY(-55%) rotate(-2.5deg);
    font-family: 'Fraunces', serif;
    font-size: 20vw;
    font-weight: 400;
    font-optical-sizing: auto;
    font-variation-settings: 'WONK' 0.5, 'SOFT' 50;
    color: var(--color-text);
    line-height: 0.85;
    letter-spacing: -0.02em;
    user-select: none;
    animation: wonk-breathe 7000ms ease-in-out infinite alternate;
  }

  @keyframes wonk-breathe {
    0%   { font-variation-settings: 'WONK' 0, 'SOFT' 30; }
    100% { font-variation-settings: 'WONK' 1, 'SOFT' 70; }
  }

  /* ── Diagonal slash ── */
  .slash {
    position: absolute;
    top: 58%;
    left: 8%;
    width: 84%;
    height: 1px;
    background: var(--color-feature);
    transform: rotate(-16deg);
    transform-origin: left center;
    opacity: 0.25;
  }

  /* ── Info block ── */
  .info {
    position: absolute;
    bottom: 64px;
    left: 48px;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
  }

  .info .meta {
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--color-text-muted);
  }

  .info .dates {
    color: var(--color-text);
    margin-top: 4px;
  }

  .info .tagline {
    color: var(--color-feature);
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-style: italic;
    font-variation-settings: 'WONK' 1, 'SOFT' 80;
    margin-top: 16px;
    letter-spacing: 0;
  }

  /* ── CTA — deliberately quiet ── */
  .cta {
    position: absolute;
    bottom: 64px;
    right: 48px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--color-text);
    text-decoration: none;
    border: 1px solid rgba(232, 220, 200, 0.3);
    padding: 16px 32px;
    opacity: 0.5;
    transition: opacity 200ms cubic-bezier(0.22, 1, 0.36, 1),
                border-color 200ms cubic-bezier(0.22, 1, 0.36, 1);
  }

  .cta:hover {
    opacity: 1;
    border-color: var(--color-feature);
  }

  .cta:focus-visible {
    outline: 2px solid var(--color-feature);
    outline-offset: 4px;
    opacity: 1;
  }

  /* ── Scroll hint ── */
  .scroll-hint {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: var(--color-text);
    opacity: 0.15;
    animation: drift-down 4000ms ease-in-out infinite;
  }

  @keyframes drift-down {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(4px); }
  }
</style>
</head>
<body>
  <div class="grain" id="grain"></div>
  <div class="light"></div>

  <main class="hero">
    <span class="edition" aria-label="9th edition">09</span>

    <h1 class="title">LIMINAL</h1>

    <div class="slash" aria-hidden="true"></div>

    <div class="info">
      <p class="meta">9th Edition &mdash; Taipei, Taiwan</p>
      <p class="dates">12&ndash;22 November 2026</p>
      <p class="tagline">What happens between cuts</p>
    </div>

    <a class="cta" href="#tickets">Get tickets</a>

    <div class="scroll-hint" aria-hidden="true">&darr;</div>
  </main>

  <script>
    // Generate film grain texture once, animate position via CSS
    (function initGrain() {
      var size = 256;
      var canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      var ctx = canvas.getContext('2d');
      var img = ctx.createImageData(size, size);

      for (var i = 0; i < img.data.length; i += 4) {
        var v = Math.random() * 255 | 0;
        img.data[i]     = v;
        img.data[i + 1] = v;
        img.data[i + 2] = v;
        img.data[i + 3] = 255;
      }

      ctx.putImageData(img, 0, 0);
      document.getElementById('grain').style.backgroundImage =
        'url(' + canvas.toDataURL() + ')';
    })();

    // Mouse-following projector light
    var root = document.documentElement;
    document.addEventListener('mousemove', function(e) {
      root.style.setProperty('--mouse-x', e.clientX + 'px');
      root.style.setProperty('--mouse-y', e.clientY + 'px');
    });

    // Reveal after fonts load (with fallback timeout)
    function reveal() { document.body.style.opacity = '1'; }
    document.fonts.ready.then(reveal);
    setTimeout(reveal, 3000);
  </script>
</body>
</html>
