<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMBRA Film Festival — 9th Edition</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet">

<style>
  *,
  *::before,
  *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --black: #060606;
    --off-black: #0e0c0a;
    --amber: #d4722c;
    --amber-dim: #b8612a;
    --amber-glow: rgba(212, 114, 44, 0.06);
    --gold: #c9a84c;
    --parchment: #ede8df;
    --parchment-mid: rgba(237, 232, 223, 0.7);
    --parchment-dim: rgba(237, 232, 223, 0.45);
    --grain-opacity: 0.04;
  }

  html {
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    background: var(--black);
    color: var(--parchment);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: none;
  }

  /* ── Custom Cursor (projector dot) ── */
  .cursor-dot {
    position: fixed;
    width: 8px;
    height: 8px;
    background: var(--amber);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    mix-blend-mode: screen;
    transition: transform 0.15s ease-out, opacity 0.3s;
    transform: translate(-50%, -50%);
  }

  .cursor-glow {
    position: fixed;
    width: 350px;
    height: 350px;
    background: radial-gradient(
      circle,
      rgba(212, 114, 44, 0.08) 0%,
      rgba(212, 114, 44, 0.025) 40%,
      transparent 70%
    );
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    transform: translate(-50%, -50%);
    transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
  }

  /* ── Film Grain Overlay ── */
  .grain {
    position: fixed;
    inset: -50%;
    width: 200%;
    height: 200%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
    opacity: var(--grain-opacity);
    pointer-events: none;
    z-index: 9998;
    animation: grain-drift 0.5s steps(3) infinite;
  }

  @keyframes grain-drift {
    0%   { transform: translate(0, 0); }
    33%  { transform: translate(-2px, 1px); }
    66%  { transform: translate(1px, -1px); }
    100% { transform: translate(0, 0); }
  }

  /* ── Ambient Background Glow (projector warmth) ── */
  .ambient {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background: radial-gradient(
      ellipse 60% 50% at 25% 45%,
      rgba(212, 114, 44, 0.03) 0%,
      transparent 70%
    );
    animation: ambient-breathe 12s ease-in-out infinite alternate;
  }

  @keyframes ambient-breathe {
    0%   { opacity: 0.4; transform: translate(0, 0) scale(1); }
    100% { opacity: 1; transform: translate(3vw, -2vh) scale(1.1); }
  }

  /* ── Hero Container ── */
  .hero {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Edition Watermark "IX" ── */
  .edition-watermark {
    position: absolute;
    top: -10vh;
    right: -4vw;
    font-family: 'Bodoni Moda', serif;
    font-size: clamp(22rem, 42vw, 55rem);
    font-weight: 900;
    font-style: italic;
    line-height: 0.78;
    color: transparent;
    -webkit-text-stroke: 1.5px rgba(212, 114, 44, 0.06);
    user-select: none;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Diagonal Slashes (paired tension) ── */
  .diagonal-slash {
    position: absolute;
    top: -10%;
    left: 55%;
    width: 2px;
    height: 140%;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      var(--amber-dim) 20%,
      var(--amber) 50%,
      var(--amber-dim) 80%,
      transparent 100%
    );
    opacity: 0.12;
    transform: rotate(15deg);
    transform-origin: top center;
    z-index: 1;
    animation: slash-reveal 2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
  }

  .diagonal-slash-2 {
    position: absolute;
    top: -10%;
    left: 58%;
    width: 1px;
    height: 140%;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      var(--parchment-dim) 30%,
      var(--parchment-mid) 50%,
      var(--parchment-dim) 70%,
      transparent 100%
    );
    opacity: 0.06;
    transform: rotate(15deg);
    transform-origin: top center;
    z-index: 1;
    animation: slash-reveal-2 2s cubic-bezier(0.16, 1, 0.3, 1) 0.7s both;
  }

  @keyframes slash-reveal {
    from { opacity: 0; clip-path: inset(100% 0 0 0); }
    to   { opacity: 0.12; clip-path: inset(0 0 0 0); }
  }

  @keyframes slash-reveal-2 {
    from { opacity: 0; clip-path: inset(100% 0 0 0); }
    to   { opacity: 0.06; clip-path: inset(0 0 0 0); }
  }

  /* ── Top Metadata Bar ── */
  .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 2rem 2.5rem;
    z-index: 10;
    animation: fade-down 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
  }

  @keyframes fade-down {
    from { opacity: 0; transform: translateY(-1rem); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .edition-label {
    font-family: 'Courier Prime', monospace;
    font-size: 0.875rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--parchment-mid);
  }

  .edition-label span {
    color: var(--amber);
  }

  /* ── Frame Counter (cinematic detail) ── */
  .frame-counter {
    position: absolute;
    top: 5rem;
    right: 2.5rem;
    font-family: 'Courier Prime', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--parchment-dim);
    writing-mode: vertical-rl;
    z-index: 10;
    animation: fade-in 1.2s cubic-bezier(0.16, 1, 0.3, 1) 1.2s both;
  }

  .frame-counter::before {
    content: '';
    display: block;
    width: 1px;
    height: 1.5rem;
    background: var(--parchment-dim);
    margin: 0 auto 0.5rem;
  }

  /* ── Vertical Side Text ── */
  .side-text {
    position: absolute;
    right: 2.5rem;
    top: 55%;
    transform: translateY(-50%) rotate(90deg);
    transform-origin: center center;
    font-family: 'Courier Prime', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--parchment-dim);
    white-space: nowrap;
    z-index: 10;
    animation: fade-in 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.8s both;
  }

  @keyframes fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── Title Block ── */
  .title-block {
    position: absolute;
    left: -3.5vw;
    top: 50%;
    transform: translateY(-58%);
    z-index: 5;
    animation: title-enter 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
  }

  @keyframes title-enter {
    from { opacity: 0; transform: translateY(-58%) translateX(-5vw); }
    to   { opacity: 1; transform: translateY(-58%) translateX(0); }
  }

  .title-main {
    font-family: 'Bodoni Moda', serif;
    font-weight: 900;
    font-size: clamp(7rem, 20vw, 26rem);
    line-height: 0.8;
    letter-spacing: -0.03em;
    color: var(--parchment);
    white-space: nowrap;
    text-shadow:
      0 0 100px rgba(212, 114, 44, 0.06),
      0 0 200px rgba(212, 114, 44, 0.025);
  }

  .title-main .letter-highlight {
    color: var(--amber);
    font-style: italic;
  }

  /* ── Subtitle — stacked under title ── */
  .title-subtitle {
    font-family: 'Courier Prime', monospace;
    font-size: 0.875rem;
    letter-spacing: 0.6em;
    text-transform: uppercase;
    color: var(--parchment-dim);
    margin-top: 1.2rem;
    margin-left: 6vw;
    animation: fade-in 1s cubic-bezier(0.16, 1, 0.3, 1) 0.9s both;
  }

  /* ── Date Stripe — below title, above tagline ── */
  .date-stripe {
    position: absolute;
    left: 10vw;
    bottom: 28%;
    transform: rotate(-3deg);
    z-index: 8;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    animation: stripe-enter 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.6s both;
  }

  @keyframes stripe-enter {
    from { opacity: 0; transform: rotate(-3deg) translateX(-2rem); }
    to   { opacity: 1; transform: rotate(-3deg) translateX(0); }
  }

  .date-stripe::before {
    content: '';
    display: block;
    width: 3.5rem;
    height: 1px;
    background: var(--amber);
    flex-shrink: 0;
  }

  .date-text {
    font-family: 'Courier Prime', monospace;
    font-size: clamp(0.85rem, 1.2vw, 1.1rem);
    letter-spacing: 0.15em;
    color: var(--amber);
    white-space: nowrap;
  }

  /* ── Bottom Content Area ── */
  .bottom-area {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 2.5rem;
    z-index: 10;
  }

  /* ── Tagline (bottom-left) ── */
  .tagline-block {
    max-width: 28rem;
    animation: fade-up 1s cubic-bezier(0.16, 1, 0.3, 1) 1s both;
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(1.5rem); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .tagline {
    font-family: 'Bodoni Moda', serif;
    font-style: italic;
    font-size: clamp(1.5rem, 2.5vw, 2.4rem);
    line-height: 1.3;
    color: var(--parchment);
    margin-bottom: 0.75rem;
  }

  .location {
    font-family: 'Courier Prime', monospace;
    font-size: 0.875rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--parchment-mid);
  }

  /* ── CTA (bottom-right) — deliberately quiet ── */
  .cta-block {
    animation: fade-up 1s cubic-bezier(0.16, 1, 0.3, 1) 1.3s both;
  }

  .cta-button {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 2rem;
    min-height: 48px;
    background: transparent;
    border: 1px solid rgba(237, 232, 223, 0.25);
    color: var(--parchment-mid);
    font-family: 'Courier Prime', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: none;
    transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    position: relative;
    overflow: hidden;
  }

  .cta-button::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--amber);
    transform: scaleX(0);
    transform-origin: right;
    transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    z-index: -1;
  }

  .cta-button:hover {
    border-color: var(--amber);
    color: var(--parchment);
  }

  .cta-button:hover::before {
    transform: scaleX(1);
    transform-origin: left;
  }

  .cta-button:focus-visible {
    outline: 2px solid var(--amber);
    outline-offset: 4px;
  }

  .cta-arrow {
    display: inline-block;
    width: 1.2rem;
    height: 1px;
    background: currentColor;
    position: relative;
    transition: width 0.4s cubic-bezier(0.23, 1, 0.32, 1);
  }

  .cta-arrow::after {
    content: '';
    position: absolute;
    right: 0;
    top: -3px;
    width: 6px;
    height: 6px;
    border-top: 1px solid currentColor;
    border-right: 1px solid currentColor;
    transform: rotate(45deg);
  }

  .cta-button:hover .cta-arrow {
    width: 2rem;
  }

  /* ── Bottom Edge Line ── */
  .bottom-edge {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(
      to right,
      transparent 0%,
      var(--amber-dim) 20%,
      var(--amber) 50%,
      var(--amber-dim) 80%,
      transparent 100%
    );
    opacity: 0.15;
    z-index: 10;
  }

  /* ── Projector Flicker on Title ── */
  .flicker {
    animation: projector-flicker 8s ease-in-out infinite;
  }

  @keyframes projector-flicker {
    0%, 100% { opacity: 1; }
    47%      { opacity: 1; }
    48%      { opacity: 0.82; }
    49%      { opacity: 1; }
    73%      { opacity: 1; }
    73.5%    { opacity: 0.88; }
    74%      { opacity: 1; }
    74.5%    { opacity: 0.9; }
    75%      { opacity: 1; }
  }

  /* ── Vignette (shifted left to anchor composition) ── */
  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(
      ellipse 75% 75% at 40% 48%,
      transparent 25%,
      rgba(6, 6, 6, 0.65) 100%
    );
    pointer-events: none;
    z-index: 2;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .title-main {
      font-size: clamp(4.5rem, 22vw, 9rem);
    }

    .title-block {
      left: -4vw;
    }

    .edition-watermark {
      font-size: clamp(14rem, 55vw, 22rem);
      right: -12vw;
    }

    .side-text,
    .frame-counter {
      display: none;
    }

    .bottom-area {
      flex-direction: column;
      align-items: flex-start;
      gap: 2rem;
      padding: 2rem;
    }

    .date-stripe {
      left: 5vw;
    }

    .top-bar {
      padding: 1.5rem;
    }

    .tagline {
      font-size: 1.4rem;
    }

    .title-subtitle {
      margin-left: 3vw;
    }

    .diagonal-slash-2 {
      display: none;
    }
  }
</style>
</head>

<body>

  <!-- Custom Cursor -->
  <div class="cursor-dot" id="cursorDot" aria-hidden="true"></div>
  <div class="cursor-glow" id="cursorGlow" aria-hidden="true"></div>

  <!-- Film Grain -->
  <div class="grain" aria-hidden="true"></div>

  <!-- Ambient Glow -->
  <div class="ambient" aria-hidden="true"></div>

  <!-- Vignette -->
  <div class="vignette" aria-hidden="true"></div>

  <section class="hero" role="banner" aria-label="UMBRA Film Festival — 9th Edition, November 12 to 19, 2026, Taipei">

    <!-- Edition Watermark -->
    <div class="edition-watermark" aria-hidden="true">IX</div>

    <!-- Diagonal Slashes -->
    <div class="diagonal-slash" aria-hidden="true"></div>
    <div class="diagonal-slash-2" aria-hidden="true"></div>

    <!-- Bottom Edge Accent -->
    <div class="bottom-edge" aria-hidden="true"></div>

    <!-- Top Bar -->
    <div class="top-bar">
      <div class="edition-label">
        <span>IX</span> — 9th Edition · 2026
      </div>
      <div class="edition-label">
        Independent & Experimental Cinema
      </div>
    </div>

    <!-- Frame Counter -->
    <div class="frame-counter" aria-hidden="true">
      FRM 001 / 024
    </div>

    <!-- Vertical Side Text -->
    <div class="side-text" aria-hidden="true">
      Taipei · 台北 · November 2026
    </div>

    <!-- Title Block -->
    <div class="title-block flicker">
      <h1 class="title-main">
        U<span class="letter-highlight">M</span>BRA
      </h1>
      <p class="title-subtitle">Film Festival</p>
    </div>

    <!-- Overlapping Date Stripe -->
    <div class="date-stripe">
      <span class="date-text">Nov 12 — 19, 2026</span>
    </div>

    <!-- Bottom Area -->
    <div class="bottom-area">
      <!-- Tagline -->
      <div class="tagline-block">
        <p class="tagline">"Every frame is a ghost."</p>
        <p class="location">Zhongshan District, Taipei · 台北中山區</p>
      </div>

      <!-- CTA -->
      <div class="cta-block">
        <a href="#tickets" class="cta-button" aria-label="Get tickets for UMBRA Film Festival">
          Get Tickets <span class="cta-arrow" aria-hidden="true"></span>
        </a>
      </div>
    </div>

  </section>

  <script>
    (function () {
      var dot = document.getElementById('cursorDot');
      var glow = document.getElementById('cursorGlow');
      var mouseX = window.innerWidth / 2;
      var mouseY = window.innerHeight / 2;
      var dotX = mouseX;
      var dotY = mouseY;
      var glowX = mouseX;
      var glowY = mouseY;

      document.addEventListener('mousemove', function (e) {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });

      function animate() {
        dotX += (mouseX - dotX) * 0.25;
        dotY += (mouseY - dotY) * 0.25;
        dot.style.left = dotX + 'px';
        dot.style.top = dotY + 'px';

        glowX += (mouseX - glowX) * 0.07;
        glowY += (mouseY - glowY) * 0.07;
        glow.style.left = glowX + 'px';
        glow.style.top = glowY + 'px';

        requestAnimationFrame(animate);
      }

      animate();

      document.addEventListener('mouseleave', function () {
        dot.style.opacity = '0';
        glow.style.opacity = '0';
      });

      document.addEventListener('mouseenter', function () {
        dot.style.opacity = '1';
        glow.style.opacity = '1';
      });

      var interactives = document.querySelectorAll('a, button');
      interactives.forEach(function (el) {
        el.addEventListener('mouseenter', function () {
          dot.style.transform = 'translate(-50%, -50%) scale(3)';
        });
        el.addEventListener('mouseleave', function () {
          dot.style.transform = 'translate(-50%, -50%) scale(1)';
        });
      });
    })();
  </script>

</body>
</html>
