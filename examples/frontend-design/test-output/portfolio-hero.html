<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex Moreno — Independent Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1ea;
    --text-primary: #1a1815;
    --text-secondary: rgba(26, 24, 21, 0.62);
    --text-tertiary: rgba(26, 24, 21, 0.42);
    --accent: #c8472b;
    --border: rgba(26, 24, 21, 0.14);

    --space-1: 8px;
    --space-2: 16px;
    --space-3: 24px;
    --space-4: 32px;
    --space-5: 48px;
    --space-6: 64px;
    --space-7: 96px;
    --space-8: 128px;

    --font-display: 'Fraunces', 'Iowan Old Style', Georgia, serif;
    --font-body: 'Manrope', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;

    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  html {
    background: var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    font-feature-settings: "kern" 1, "liga" 1;
  }

  body {
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ─────────── Hero ─────────── */

  .hero {
    min-height: 100dvh;
    padding: var(--space-6) var(--space-7);
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr auto;
    column-gap: var(--space-5);
    row-gap: var(--space-3);
    position: relative;
  }

  /* Subtle baseline rule — visual rhyming */
  .hero::before,
  .hero::after {
    content: "";
    position: absolute;
    left: var(--space-7);
    right: var(--space-7);
    height: 1px;
    background: var(--border);
    pointer-events: none;
  }
  .hero::before { top: var(--space-5); }
  .hero::after  { bottom: var(--space-5); }

  /* ─────────── Meta blocks ─────────── */

  .meta {
    font-size: 14px;            /* floor: caption minimum */
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-secondary);
    font-feature-settings: "tnum" 1, "kern" 1;
    line-height: 1.4;
    z-index: 1;
  }

  .meta--top-left   { grid-column: 1; grid-row: 1; align-self: start; justify-self: start; }
  .meta--top-right  { grid-column: 2; grid-row: 1; align-self: start; justify-self: end;  text-align: right; }
  .meta--bot-left   { grid-column: 1; grid-row: 3; align-self: end;   justify-self: start; }
  .meta--bot-right  { grid-column: 2; grid-row: 3; align-self: end;   justify-self: end;  text-align: right; }

  .meta a {
    display: inline-block;
    color: var(--text-primary);
    text-decoration: none;
    padding: 14px 0;             /* tap target ≥44px */
    border-bottom: 1px solid var(--border);
    transition: border-color 180ms var(--ease), color 180ms var(--ease);
  }
  .meta a:hover {
    border-bottom-color: var(--accent);
  }
  .meta a:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 6px;
    border-bottom-color: var(--accent);
  }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 10px;
    vertical-align: 1px;
  }

  /* ─────────── Anchor statement ─────────── */

  .statement {
    grid-column: 1 / -1;
    grid-row: 2;
    align-self: center;

    margin: 0;
    font-family: var(--font-display);
    font-weight: 380;
    font-size: clamp(56px, 13.5vw, 220px);
    line-height: 0.92;
    letter-spacing: -0.035em;
    font-variation-settings: "opsz" 144, "SOFT" 30, "WONK" 0;
    color: var(--text-primary);
    max-width: 16ch;
  }

  .statement em {
    font-style: italic;
    color: var(--accent);
    font-feature-settings: "ss01" 1;
    font-variation-settings: "opsz" 144, "SOFT" 100, "WONK" 1;
  }

  /* ─────────── Mobile collapse ─────────── */
  /* Per breakpoint translation rule: collapsed grid is no longer Hierarchical
     in the spatial sense; it becomes Manuscript. Anchor still dominates by size. */

  @media (max-width: 720px) {
    .hero {
      padding: var(--space-5) var(--space-3);
      grid-template-columns: 1fr;
      grid-template-rows: auto auto 1fr auto auto;
      row-gap: var(--space-3);
    }
    .hero::before { left: var(--space-3); right: var(--space-3); top: var(--space-4); }
    .hero::after  { left: var(--space-3); right: var(--space-3); bottom: var(--space-4); }

    .meta--top-left  { grid-row: 1; grid-column: 1; }
    .meta--top-right { grid-row: 2; grid-column: 1; justify-self: start; text-align: left; }
    .statement       { grid-row: 3; grid-column: 1; max-width: 100%; }
    .meta--bot-left  { grid-row: 4; grid-column: 1; }
    .meta--bot-right { grid-row: 5; grid-column: 1; justify-self: start; text-align: left; }
  }

  @media (prefers-reduced-motion: reduce) {
    .meta a { transition: none; }
  }
</style>
</head>
<body>
  <main class="hero" aria-labelledby="statement">

    <div class="meta meta--top-left">
      Alex&nbsp;Moreno · Independent&nbsp;Designer
    </div>

    <div class="meta meta--top-right">
      Selected Work<br>2018&thinsp;—&thinsp;2026
    </div>

    <h1 class="statement" id="statement">
      Type-led identity<br>
      for the <em>underestimated.</em>
    </h1>

    <div class="meta meta--bot-left">
      <span class="status-dot" aria-hidden="true"></span>
      Available · Spring&nbsp;2026
    </div>

    <div class="meta meta--bot-right">
      <a href="mailto:hello@moreno.studio">hello@moreno.studio</a>
    </div>

  </main>
</body>
</html>
